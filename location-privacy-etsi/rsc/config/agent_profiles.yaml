# -------------------------------------------------------------------------
# agent_profiles.yaml - FINALE VERSION
# Optimiert für realistische Streuung (Gleitzeit vs. Pünktlichkeit)
# -------------------------------------------------------------------------

agent_distribution:
  parttimeworker: 18
  nightworker: 7
  homestay: 8
  freelance: 12
  # worker (fulltime) ist der Rest auf 100%

agent_profiles:

  # ---------------------------------------------------------
  # WORKER (Vollzeit)
  # Szenario: Bürojob mit Gleitzeit
  # ---------------------------------------------------------
  worker:
    work:
      duration: 8.5    # 8h Arbeit + 30min Pause
      mean: 8.0        # Ziel: 08:00 Uhr
      std: 0.75        # Abweichung: +/- 45 Min (Kernzeit-Feeling)
      start: 8.0       # Fallback
      end: 16.5
    grocery:
      prob: 0.5
      duration: 0.75   # 45 Min Einkauf
      mean: 0.75
      std: 0.25        # Mal 30 Min, mal 1h
      stay_min: 0.25
      stay_max: 1.5
    errands:
      prob: 0.3
      duration: 1.0
      mean: 1.0
      std: 0.5
      stay_min: 0.25
      stay_max: 2.5

  # ---------------------------------------------------------
  # PART TIME (Teilzeit)
  # Szenario: Sehr flexible Schichten (Gastro, Einzelhandel, Halbtags)
  # ---------------------------------------------------------
  parttimeworker:
    work:
      duration: 4.0
      mean: 10.0       # Schnitt 10 Uhr
      std: 2.0         # SEHR HOHE Abweichung (+/- 2h): Starten zw. 8 und 12
      start: 10.0
      end: 14.0
    chores:
      prob: 0.6
      duration: 1.0
      mean: 1.0
      std: 0.5
      stay_min: 0.5
      stay_max: 2.0

  # ---------------------------------------------------------
  # NIGHT WORKER (Nachtschicht)
  # Szenario: Fabrik/Sicherheit/Pflege - Relativ pünktlich
  # ---------------------------------------------------------
  nightworker:
    work:
      duration: 8.0
      mean: 22.0       # 22:00 Uhr
      std: 0.25        # GERINGE Abweichung (+/- 15 Min). Schichtübergabe ist strikt!
      start: 22.0
      end: 6.0
    grocery:
      prob: 0.5
      duration: 0.75
      mean: 0.75
      std: 0.25
      stay_min: 0.25
      stay_max: 1.5
    chores:
      prob: 0.4
      duration: 1.0
      mean: 1.0
      std: 0.5
      stay_min: 0.5
      stay_max: 2.0

  # ---------------------------------------------------------
  # HOMESTAY (Elternteil)
  # Szenario: Morgens Schule (strikt), danach flexibel
  # ---------------------------------------------------------
  homestay:
    school:
      prob: 1.0        # Täglich
      duration: 0.2    # ca. 12 Min Drop-off
      time: 7.8        # 07:48 Uhr (kurz vor 8)
      mean: 7.8
      std: 0.1         # SEHR GERING (+/- 6 Min). Schule wartet nicht.
    grocery:
      prob: 0.7
      duration: 1.0
      time: 10.0
      mean: 1.0
      std: 0.5         # Einkaufen ist flexibel
      stay_min: 0.5
      stay_max: 2.0
    activity:
      prob: 0.4
      duration: 1.5
      time: 15.0
      mean: 1.5
      std: 0.5
      stay_min: 1.0
      stay_max: 3.0
    extra:
      prob: 0.2
      duration: 1.0
      mean: 1.0
      std: 0.5
      stay_min: 0.5
      stay_max: 2.0

  # ---------------------------------------------------------
  # FREELANCE (Selbstständig)
  # Szenario: Komplett flexibel / Home Office Mix
  # ---------------------------------------------------------
  freelance:
    stay_home_prob: 0.3
    activity:
      time_min: 9.0
      time_max: 19.0

      num_activities_min: 1
      num_activities_max: 3

      duration: 1.5
      mean: 1.5        # Dauer eines Meetings
      std: 0.75        # HOHE Abweichung (Meetings dauern oft länger/kürzer)

      stay_duration_min: 0.5
      stay_duration_max: 3.0

      chain_trips_prob: 0.6